name: Build on Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Maximize build disk space
        if: runner.os == 'Linux'
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          overprovision-lvm: true
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ~/vcpkg-cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl zip unzip tar python3 python3-pip python3-venv cmake ninja-build build-essential

      - name: Clone vcpkg and bootstrap
        shell: bash
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
            ./vcpkg/vcpkg integrate install
          fi
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release

      - name: Run tests
        shell: bash
        run: |
          cd build
          ctest --build-config Release --output-on-failure --parallel 2
        continue-on-error: true
